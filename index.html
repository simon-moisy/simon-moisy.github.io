  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nteractive systems, and computer vision. Mostly permanent installations and themed entertainment, from Shanghai Disneyland to automotive brand activations, with recurring Walt Disney Imagineering collaborations across <span style=\"color:var(--fg);\">2012–2025<\u002Fspan>.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; line-height:1.5; display:flex; flex-direction:column; gap:15px; padding-top:3px;\">\n          <div><div style=\"color:var(--faint); text-transform:uppercase; letter-spacing:0.11em; font-size:9.5px; margin-bottom:4px;\">Languages<\u002Fdiv><div style=\"color:var(--fg);\">FR · EN<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"color:var(--faint); text-transform:uppercase; letter-spacing:0.11em; font-size:9.5px; margin-bottom:4px;\">Contact<\u002Fdiv>\n            <a href=\"mailto:simon.moisy@tutanota.com\" style=\"color:var(--fg); text-decoration:none; border-bottom:1px solid var(--rule); transition:color .2s;\" style-hover=\"color:var(--accent);\">simon.moisy@tutanota.com<\u002Fa>\n            <a href=\"https://www.linkedin.com/in/simon-moisy/\" target=\"_blank\" style=\"display:block; margin-top:4px; color:var(--fg); text-decoration:none; border-bottom:1px solid var(--rule); width:fit-content; transition:color .2s;\" style-hover=\"color:var(--accent);\">LinkedIn<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 01 WORK LOG ── -->\n    <section id=\"work\" style=\"margin-top:72px; scroll-margin-top:72px;\">\n      <div style=\"display:flex; align-items:center; gap:18px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); letter-spacing:0.05em;\">01<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:0.18em; text-transform:uppercase; color:var(--fg);\">Work Log<\u002Fspan>\n        <span style=\"flex:1; height:1px; background:var(--rule);\"><\u002Fspan>\n        <sc-if value=\"{{ showAnnotations }}\" hint-placeholder-val=\"{{ true }}\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.1em; color:var(--faint);\">14 ENGAGEMENTS<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:18px;\">\n\n        <div style=\"display:grid; grid-template-columns:120px 1fr 116px; gap:28px; align-items:start; padding:22px 16px; margin:0 -16px; border-top:1px solid var(--rule2); border-left:2px solid transparent; transition:background .18s, border-color .18s;\" style-hover=\"background:var(--hover); border-left:2px solid var(--accent);\">\n          <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--fg); letter-spacing:0.02em;\">Jan 2018 - Now<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--faint); letter-spacing:0.09em; text-transform:uppercase; margin-top:5px;\">Self-employed<\u002Fdiv><\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:17px; line-height:1.3; color:var(--fg);\">Principal Technical Director &amp; Systems Architect <span style=\"color:var(--accent); font-weight:500;\">· Kagami LTD<\u002Fspan><\u002Fdiv>\n            <p style=\"font-family:'Archivo',sans-serif; font-size:14.5px; line-height:1.62; color:var(--fg2); margin-top:9px; max-width:62ch;\">Independent technical practice - real-time 3D (primarily Unity), purpose-built backends, and computer-vision integration. Briefs that sit outside convention, built for permanent, always-on deployment where uptime, latency budgets, and graceful failure are fixed requirements rather than goals.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--faint); text-align:right; letter-spacing:0.05em; padding-top:3px;\">APAC<\u002Fdiv>\n        <\u002Fdiv>\n\n space; font-size:11.5px; color:var(--fg); letter-spacing:0.02em;\">Jan - Apr 2025<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--faint); letter-spacing:0.09em; text-transform:uppercase; margin-top:5px;\">Contract · 3rd WDI<\u002Fdiv><\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:17px; line-height:1.3; color:var(--fg);\">Interactive Systems Engineer <span style=\"color:var(--accent); font-weight:500;\">· Walt Disney Imagineering<\u002Fspan><\u002Fdiv>\n            <p style=\"font-family:'Archivo',sans-serif; font-size:14.5px; line-height:1.62; color:var(--fg2); margin-top:9px; max-width:62ch;\">Returned to modernise and maintain interactive attraction software originally architected in 2012–2016 - addressing hardware obsolescence while preserving the live guest experience. <span style=\"color:var(--fg);\">A third engagement with WDI across 13 years.<\u002Fspan><\u002Fp>\n          <\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--faint); text-align:right; letter-spacing:0.05em; padding-top:3px;\">SHANGHAI<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:120px 1fr 116px; gap:28px; align-items:start; padding:22px 16px; margin:0 -16px; border-top:1px solid var(--rule2); border-left:2px solid transparent; transition:background .18s, border-color .18s;\" style-hover=\"background:var(--hover); border-left:2px solid var(--accent);\">\n          <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--fg); letter-spacing:0.02em;\">2024<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--faint); letter-spacing:0.09em; text-transform:uppercase; margin-top:5px;\">Contract<\u002Fdiv><\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:17px; o',sans-serif; font-size:14px; line-height:1.65; color:var(--fg2); margin-top:8px; max-width:78ch;\">Technical lead for a 3-person team delivering an AI-driven in-car copilot prototype - a real-time audio/video conversational system controlling cabin functions (temperature, music, seating, scent). Local multimodal LLM stack with ElevenLabs TTS and FasterWhisper for low-latency voice. Deployed for live testing at Forvia Shanghai.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.04em; color:var(--muted); padding:3px 8px; border:1px solid var(--rule);\">LLM / RAG<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.04em; color:var(--muted); padding:3px 8px; border:1px solid var(--rule);\">ElevenLabs<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.04em; color:var(--muted); padding:3px 8px; border:1px solid var(--rule);\">FasterWhisper<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.04em; color:var(--muted); padding:3px 8px; border:1px solid var(--rule);\">Python<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.04em; color:var(--muted); padding:3px 8px; border:1px solid var(--rule);\">Real-time Audio<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--sheet); padding:20px 22px; border-left:2px solid transparent; transition:background .18s, border-color .18s;\" style-hover=\"background:var(--hover); border-left:2px solid var(--accent);\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.09em; text-transform:uppercase; color:var(--faint); margin-bottom:6px;\">Walt Disney Imagineering, Glendale · 2014<\u002Fdiv>\n          <div style=\"font-family:'Archivo',sans-serif; font-weight:600; font-size:16px; color:var(--fg);\">Disney Open House Dinner Experience - R&amp;D<\u002Fdiv>\n          <p style=\"font-family:'Archivo',sans-serif; font-size:14px; line-height:1.65; color:var(--fg2); margin-top:8px; max-width:78ch;\">Computer-vision and Unity3D developer on an interactive dining experience under Jon Snoddy (former head of R&amp;D, WDI). Separate R&amp;D as a Unity3D developer on a Sugar Rush mixed-reality project for in-park deployment.<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;\">\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.04em; color:var(--muted); padding:3px 8px; border:1px solid var(--rule);\">Computer Vision<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.04em; color:var(--muted); padding:3px 8px; border:1px solid var(--rule);\">Unity3D<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.04em; color:var(--muted); padding:3px 8px; border:1px solid var(--rule);\">Real-time Systems<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.04em; color:var(--muted); padding:3px 8px; border:1px solid var(--rule);\">Mixed Reality<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:24px;\">\n        <div>\n          <div style=\"position:relative; padding-bottom:56.25%; height:0; overflow:hidden; background:var(--hover); border:1px solid var(--rule);\">\n            <iframe src=\"https://www.youtube.com/embed/CEDm0srHJXs\" allowfullscreen=\"\" loading=\"lazy\" style=\"position:absolute; top:0; left:0; width:100%; height:100%; border:none;\"><\u002Fiframe>\n          <\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.04em; color:var(--muted); margin-top:9px; line-height:1.5;\"><span style=\"display:block; color:var(--fg); margin-bottom:2px;\">Porsche Taycan - Interactive Brand Experience<\u002Fspan>Unity 8-machine synchronised install · Cinemachine · Blazor option backend<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"position:relative; padding-bottom:56.25%; height:0; overflow:hidden; background:var(--hover); border:1px solid var(--rule);\">\n            <iframe src=\"https://www.youtube.com/embed/H_5k-Q-g8qk\" allowfullscreen=\"\" loading=\"lazy\" style=\"position:absolute; top:0; left:0; width:100%; height:100%; border:none;\"><\u002Fiframe>\n          <\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.04em; color:var(--muted); margin-top:9px; line-height:1.5;\"><span style=\"display:block; color:var(--fg); margin-bottom:2px;\">Shanghai Disneyland - Enchanted Storybook Castle<\u002Fspan>Five interactive attractions · Walt Disney Imagineering · 2012–2016<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 03 CLIENTS ── -->\n    <section id=\"clients\" style=\"margin-top:72px; scroll-margin-top:72px;\">\n      <div style=\"display:flex; align-items:center; gap:18px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); letter-spacing:0.05em;\">03<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:0.18em; text-transform:uppercase; color:var(--fg);\">Clients &amp; Collaborators<\u002Fspan>\n        <span style=\"flex:1; height:1px; background:var(--rule);\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-top:26px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.04em; color:var(--fg); padding:6px 12px; border:1px solid var(--rule); background:var(--chip);\">Walt Disney Imagineering<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.04em; color:var(--fg); padding:6px 12px; border:1px solid var(--rule); background:var(--chip);\">Porsche<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.04em; color:var(--fg); padding:6px 12px; border:1px solid var(--rule); background:var(--chip);\">Audi<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.04em; color:var(--fg); padding:6px 12px; border:1px solid var(--rule); background:var(--chip);\">FORVIA<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.04em; color:var(--fg); padding:6px 12px; border:1px solid var(--rule); background:var(--chip);\">Intel<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.04em; color:var(--fg); padding:6px 12px; border:1px solid var(--rule); background:var(--chip);\">Microsoft<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.04em; color:var(--fg); padding:6px 12px; border:1px solid var(--rule); background:var(--chip);\">Google<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.04em; color:var(--fg); padding:6px 12px; border:1px solid var(--rule); background:var(--chip);\">Operative Games<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.04em; color:var(--fg); padding:6px 12px; border:1px solid var(--rule); background:var(--chip);\">Bolder Games<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.04em; color:var(--fg); padding:6px 12px; border:1px solid var(--rule); background:var(--chip);\">Sokaris Inc.<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.04em; color:var(--fg); padding:6px 12px; border:1px solid var(--rule); background:var(--chip);\">Red Rabbit Animation<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 04 PROFILE ── -->\n    <section id=\"profile\" style=\"margin-top:72px; scroll-margin-top:72px;\">\n      <div style=\"display:flex; align-items:center; gap:18px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); letter-spacing:0.05em;\">04<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:0.18em; text-transform:uppercase; color:var(--fg);\">Profile<\u002Fspan>\n        <span style=\"flex:1; height:1px; background:var(--rule);\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:26px; max-width:70ch;\">\n        <p style=\"font-family:'Archivo',sans-serif; font-size:15.5px; line-height:1.78; color:var(--fg2); margin-bottom:1.1em;\">Freelance technical director working with international studios and brands across real-time 3D, AI interaction systems, and computer vision since 2008. Most projects have been permanent or long-running installations - theme-park attractions, brand experiences, interactive environments - much of it delivered in Shanghai for clients including Walt Disney Imagineering, Porsche, and Audi.<\u002Fp>\n        <p style=\"font-family:'Archivo',sans-serif; font-size:15.5px; line-height:1.78; color:var(--fg2); margin-bottom:1.1em;\">Multiple Walt Disney Imagineering collaborations between 2012 and 2025, including three WDI Shanghai engagements covering the full lifecycle of Shanghai Disneyland’s castle walkthrough - from prototyping to grand opening to hardware modernisation thirteen years later - plus WDI Glendale Open House and internal projects.<\u002Fp>\n        <p style=\"font-family:'Archivo',sans-serif; font-size:15.5px; line-height:1.78; color:var(--fg2);\">Earlier: co-founded Sokaris Inc. in Shanghai, an interdisciplinary studio making physical-digital installations for brand and cultural clients, and Moria, a mixed-reality education startup using HoloLens 2.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 05 HOW I WORK ── -->\n    <section id=\"how-i-work\" style=\"margin-top:72px; scroll-margin-top:72px;\">\n      <div style=\"display:flex; align-items:center; gap:18px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); letter-spacing:0.05em;\">05<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:0.18em; text-transform:uppercase; color:var(--fg);\">Method<\u002Fspan>\n        <span style=\"flex:1; height:1px; background:var(--rule);\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:26px; max-width:70ch;\">\n        <p style=\"font-family:'Archivo',sans-serif; font-size:15.5px; line-height:1.78; color:var(--fg2); margin-bottom:1.1em;\">Most engagements start with an incomplete brief - a creative direction without a defined technical path. The first step is usually figuring out what the system actually needs to be: hardware constraints, latency budgets, failure handling, data flow between components. Architecture decisions made early tend to be the ones hardest to reverse later.<\u002Fp>\n        <p style=\"font-family:'Archivo',sans-serif; font-size:15.5px; line-height:1.78; color:var(--fg2); margin-bottom:1.1em;\">Work is typically contract-based and embedded within a studio or agency team. Scope ranges from full-stack ownership - backend, real-time runtime, computer vision, deployment - to focused engagements on a specific layer. Most projects involve some combination of Unity3D, software engineering, and a computer-vision or AI pipeline.<\u002Fp>\n        <p style=\"font-family:'Archivo',sans-serif; font-size:15.5px; line-height:1.78; color:var(--fg2);\">Available for extended on-site periods worldwide, with remote collaboration between visits. Open to projects in themed entertainment, brand experience, AI interaction, and architectural visualisation.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 06 CAPABILITIES ── -->\n    <section id=\"capabilities\" style=\"margin-top:72px; scroll-margin-top:72px;\">\n      <div style=\"display:flex; align-items:center; gap:18px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); letter-spacing:0.05em;\">06<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:0.18em; text-transform:uppercase; color:var(--fg);\">Capabilities<\u002Fspan>\n        <span style=\"flex:1; height:1px; background:var(--rule);\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:30px 40px; margin-top:30px;\">\n        <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.11em; text-transform:uppercase; color:var(--accent); margin-bottom:9px;\">Real-Time 3D<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif; font-size:14px; color:var(--fg2); line-height:1.6;\">Unity3D · Unreal Engine · TouchDesigner · GLSL · shader authoring · rendering pipelines<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.11em; text-transform:uppercase; color:var(--accent); margin-bottom:9px;\">AI &amp; LLM Systems<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif; font-size:14px; color:var(--fg2); line-height:1.6;\">Ollama · LLM/RAG pipeline design · ElevenLabs · FasterWhisper · multi-agent · prompt engineering<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.11em; text-transform:uppercase; color:var(--accent); margin-bottom:9px;\">Computer Vision<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif; font-size:14px; color:var(--fg2); line-height:1.6;\">OpenCV · body &amp; gesture tracking · camera interaction · audience detection · lighting-robust calibration<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.11em; text-transform:uppercase; color:var(--accent); margin-bottom:9px;\">Languages &amp; Tooling<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif; font-size:14px; color:var(--fg2); line-height:1.6;\">Python · C# · C/C++ · HLSL/GLSL · Bash · REST integration · Git · pipeline automation<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.11em; text-transform:uppercase; color:var(--accent); margin-bottom:9px;\">Systems Architecture<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif; font-size:14px; color:var(--fg2); line-height:1.6;\">End-to-end stack design · hardware–software integration · latency optimisation · failure planning · handover docs<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:0.11em; text-transform:uppercase; color:var(--accent); margin-bottom:9px;\">Domain Experience<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif; font-size:14px; color:var(--fg2); line-height:1.6;\">Themed entertainment · permanent installations · architectural visualisation · brand activations · AI characters<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 07 AVAILABILITY ── -->\n    <section id=\"availability\" style=\"margin-top:72px; scroll-margin-top:72px;\">\n      <div style=\"display:flex; align-items:center; gap:18px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--accent); letter-spacing:0.05em;\">07<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:0.18em; text-transform:uppercase; color:var(--fg);\">Availability<\u002Fspan>\n        <span style=\"flex:1; height:1px; background:var(--rule);\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:26px; border:1px solid var(--rule); border-left:2px solid var(--accent); padding:26px 28px; display:grid; grid-template-columns:160px 1fr; gap:32px; align-items:start;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; line-height:1.9; letter-spacing:0.04em; color:var(--muted);\">\n          <div style=\"display:flex; align-items:center; gap:8px; color:var(--fg);\"><span style=\"width:7px; height:7px; border-radius:50%; background:var(--accent);\"><\u002Fspan>OPEN - 2026<\u002Fdiv>\n          <div style=\"margin-top:10px; color:var(--faint); text-transform:uppercase; letter-spacing:0.1em; font-size:9px;\">Engagement<\u002Fdiv>\n          <div>Fractional · Contract<\u002Fdiv>\n          <div style=\"margin-top:8px;\">GMT+8 - Will travel<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-family:'Archivo',sans-serif; font-size:15.5px; line-height:1.75; color:var(--fg2); margin:0;\">Available for fractional and contract engagements as an embedded technical director - permanent installations, AI-driven interactive experiences, and architectural visualisation. Open to studios and agencies needing technical ownership at the intersection of real-time 3D, AI, and physical space. Available to travel for production periods.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── FOOTER ── -->\n    <footer style=\"margin-top:64px; padding-top:22px; border-top:1px solid var(--rule); display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--faint);\">\n      <span>Simon Moisy © 2026<\u002Fspan>\n      <a href=\"mailto:simon.moisy@tutanota.com\" style=\"color:var(--muted); text-decoration:none; transition:color .2s;\" style-hover=\"color:var(--accent);\">simon.moisy@tutanota.com<\u002Fa>\n    <\u002Ffooter>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:1500},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2f5fd0&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#2f5fd0&quot;,&quot;#414751&quot;,&quot;#b06a1f&quot;,&quot;#2f7d52&quot;]},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dark&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;showAnnotations&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { theme: 'light' };\n\n  ACCENTS = {\n    '#2f5fd0': { light: '#2f5fd0', dark: '#6e97ee' },\n    '#414751': { light: '#414751', dark: '#9aa1ab' },\n    '#b06a1f': { light: '#b06a1f', dark: '#e0a050' },\n    '#2f7d52': { light: '#2f7d52', dark: '#5fb487' },\n  };\n\n  applyAccent(theme) {\n    const key = this.props.accentColor || '#2f5fd0';\n    const map = this.ACCENTS[key];\n    const val = map ? map[theme] : key;\n    document.documentElement.style.setProperty('--accent', val);\n  }\n\n  applyTheme(theme) {\n    document.documentElement.setAttribute('data-theme', theme);\n    this.applyAccent(theme);\n    const lb = document.getElementById('ds-btn-light');\n    const db = document.getElementById('ds-btn-dark');\n    if (lb) lb.style.color = theme === 'light' ? 'var(--fg)' : 'var(--muted)';\n    if (db) db.style.color = theme === 'dark' ? 'var(--fg)' : 'var(--muted)';\n  }\n\n  setTheme(theme) {\n    try { localStorage.setItem('sm-theme', theme); } catch (e) {}\n    this.setState({ theme });\n    this.applyTheme(theme);\n  }\n\n  updateSpy = () => {\n    const links = document.querySelectorAll('[data-spy]');\n    if (!links.length) return;\n    const ids = [...links].map(a => a.getAttribute('data-spy'));\n    const sections = ids.map(id => document.getElementById(id)).filter(Boolean);\n    const marker = window.scrollY + 120 + window.innerHeight * 0.28;\n    const atBottom = (document.documentElement.scrollHeight - (window.scrollY + window.innerHeight)) <= 2;\n    let current = sections[0];\n    if (atBottom) {\n      current = sections[sections.length - 1];\n    } else {\n      sections.forEach(s => { if (s.offsetTop <= marker) current = s; });\n    }\n    links.forEach(a => {\n      const on = current && a.getAttribute('data-spy') === current.id;\n      a.style.color = on ? 'var(--fg)' : 'var(--muted)';\n      a.style.borderBottomColor = on ? 'var(--accent)' : 'transparent';\n    });\n  };\n\n  componentDidMount() {\n    let saved = null;\n    try { saved = localStorage.getItem('sm-theme'); } catch (e) {}\n    const initial = saved || this.props.defaultTheme || 'light';\n    this.setState({ theme: initial });\n    this.applyTheme(initial);\n    this.updateSpy();\n    window.addEventListener('scroll', this.updateSpy, { passive: true });\n    window.addEventListener('resize', this.updateSpy);\n  }\n\n  componentDidUpdate(prev) {\n    if (prev.accentColor !== this.props.accentColor) this.applyAccent(this.state.theme);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this.updateSpy);\n    window.removeEventListener('resize', this.updateSpy);\n  }\n\n  renderVals() {\n    return {\n      showAnnotations: this.props.showAnnotations ?? true,\n      setLight: () => this.setTheme('light'),\n      setDark: () => this.setTheme('dark'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
